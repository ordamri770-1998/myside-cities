<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניתוח ערים | MY SIDE Investments</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#07090f; --card:#0e1118; --card2:#141820; --border:#1c2133;
  --orange:#f97316; --blue:#3b82f6; --green:#10b981; --red:#ef4444;
  --yellow:#f59e0b; --text:#e8ecf5; --muted:#6b7594;
}
body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.header { padding:18px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--card); }
.logo { font-size:19px; font-weight:900; }
.logo span { color:var(--orange); }
.badge { font-size:11px; background:rgba(249,115,22,0.12); color:var(--orange); border:1px solid rgba(249,115,22,0.3); padding:4px 10px; border-radius:20px; }
.main { max-width:920px; margin:0 auto; padding:32px 18px; }
.hero { text-align:center; margin-bottom:32px; }
.hero h1 { font-size:38px; font-weight:900; line-height:1.1; margin-bottom:8px; }
.hero h1 span { color:var(--orange); }
.hero p { color:var(--muted); font-size:14px; }
.api-section { background:rgba(59,130,246,0.06); border:1px solid rgba(59,130,246,0.2); border-radius:12px; padding:14px 18px; margin-bottom:16px; }
.api-label { font-size:12px; color:var(--muted); margin-bottom:7px; }
.api-key-input { width:100%; background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:8px 11px; font-family:'Heebo',sans-serif; font-size:13px; color:var(--text); outline:none; direction:ltr; }
.api-key-input:focus { border-color:var(--blue); }
.search-wrap { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:22px; margin-bottom:20px; }
.search-label { font-size:12px; font-weight:700; color:var(--muted); margin-bottom:9px; display:block; text-transform:uppercase; letter-spacing:0.5px; }
.search-row { display:flex; gap:9px; }
.search-input { flex:1; background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px 15px; font-family:'Heebo',sans-serif; font-size:17px; font-weight:500; color:var(--text); outline:none; text-align:right; transition:border-color 0.2s; }
.search-input:focus { border-color:var(--orange); }
.search-input::placeholder { color:var(--muted); font-weight:300; }
.btn-analyze { background:var(--orange); color:white; border:none; border-radius:10px; padding:12px 24px; font-family:'Heebo',sans-serif; font-size:15px; font-weight:700; cursor:pointer; white-space:nowrap; transition:opacity 0.2s; }
.btn-analyze:hover { opacity:0.88; }
.btn-analyze:disabled { opacity:0.45; cursor:not-allowed; }
.quick-cities { display:flex; flex-wrap:wrap; gap:7px; margin-top:13px; align-items:center; }
.city-chip { background:var(--card2); border:1px solid var(--border); border-radius:20px; padding:5px 12px; font-size:13px; color:var(--muted); cursor:pointer; transition:all 0.2s; font-family:'Heebo',sans-serif; }
.city-chip:hover { border-color:var(--orange); color:var(--orange); }
.status-bar { display:none; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:20px; align-items:center; gap:13px; }
.status-bar.active { display:flex; }
.spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform:rotate(360deg); } }
.status-text { font-size:14px; color:var(--muted); }
.status-step { color:var(--orange); font-weight:700; }
.results { display:none; }
.results.active { display:block; }
.error-box { display:none; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.3); border-radius:12px; padding:14px 18px; margin-bottom:18px; font-size:14px; color:#fca5a5; }
.error-box.active { display:block; }
.warn-box { background:rgba(249,115,22,0.08); border:1px solid rgba(249,115,22,0.2); border-radius:10px; padding:10px 15px; margin-bottom:16px; font-size:13px; color:var(--orange); }

/* TABS */
.tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:5px; }
.tab { flex:1; padding:10px 6px; text-align:center; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; border-radius:9px; transition:all 0.2s; }
.tab.active { background:var(--orange); color:white; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* CITY HEADER */
.city-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:22px; padding-bottom:18px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:14px; }
.city-name { font-size:44px; font-weight:900; line-height:1; }
.city-subtitle { font-size:13px; color:var(--muted); margin-top:6px; }
.score-box { text-align:center; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:13px 20px; }
.score-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.score-value { font-size:32px; font-weight:900; margin:3px 0; }
.score-sub { font-size:12px; color:var(--muted); max-width:120px; }
.score-a { color:var(--green); } .score-b { color:var(--orange); } .score-c { color:var(--red); }

/* STATS GRID */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px; }
.stats-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px; }
.stats-grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:18px; }
@media(max-width:650px) { .stats-grid,.stats-grid-3 { grid-template-columns:repeat(2,1fr); } }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:15px 13px; }
.stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
.stat-value { font-size:21px; font-weight:700; }
.stat-change { font-size:12px; margin-top:3px; }
.up { color:var(--green); } .down { color:var(--red); } .neutral { color:var(--muted); }

/* SECTION */
.section { margin-bottom:18px; }
.section-title { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:9px; }
.analysis-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:17px 19px; }
.analysis-text { font-size:14px; line-height:1.8; color:#c0c8d8; }
.analysis-text strong { color:var(--orange); font-weight:700; }

/* HIGHLIGHTS */
.highlights { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
@media(max-width:540px) { .highlights { grid-template-columns:1fr; } }
.highlight { border-radius:12px; padding:15px 17px; border:1px solid; }
.highlight.green { background:rgba(16,185,129,0.07); border-color:rgba(16,185,129,0.22); }
.highlight.red { background:rgba(239,68,68,0.07); border-color:rgba(239,68,68,0.22); }
.highlight.orange { background:rgba(249,115,22,0.07); border-color:rgba(249,115,22,0.22); }
.highlight.blue { background:rgba(59,130,246,0.07); border-color:rgba(59,130,246,0.22); }
.highlight-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:8px; }
.highlight.green .highlight-title { color:var(--green); }
.highlight.red .highlight-title { color:var(--red); }
.highlight.orange .highlight-title { color:var(--orange); }
.highlight.blue .highlight-title { color:var(--blue); }
.highlight ul { padding-right:15px; }
.highlight ul li { font-size:13px; color:#bec8d8; margin-bottom:5px; line-height:1.5; }

/* VERDICT */
.verdict { background:linear-gradient(135deg,rgba(249,115,22,0.1),rgba(249,115,22,0.03)); border:1px solid rgba(249,115,22,0.3); border-radius:14px; padding:20px 22px; margin-bottom:18px; }
.verdict-label { font-size:12px; color:var(--orange); font-weight:700; letter-spacing:0.6px; text-transform:uppercase; margin-bottom:8px; }
.verdict-text { font-size:15px; line-height:1.7; color:var(--text); }

/* NEIGHBORHOODS */
.neighborhoods { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:18px; }
.neighborhood-tag { background:rgba(249,115,22,0.1); border:1px solid rgba(249,115,22,0.3); border-radius:20px; padding:5px 13px; font-size:13px; color:var(--orange); }

/* SUPPLY-DEMAND TABLE */
.supply-table { width:100%; border-collapse:collapse; margin-bottom:18px; }
.supply-table th { background:var(--card2); border:1px solid var(--border); padding:10px 12px; font-size:12px; font-weight:700; color:var(--muted); text-align:center; letter-spacing:0.4px; }
.supply-table td { background:var(--card); border:1px solid var(--border); padding:10px 12px; font-size:14px; text-align:center; font-weight:500; }
.supply-table tr:hover td { background:var(--card2); }
.supply-table .year-col { color:var(--orange); font-weight:700; }
.supply-table .deficit { color:var(--red); font-weight:700; }
.supply-table .surplus { color:var(--green); font-weight:700; }
.supply-table .neutral-val { color:var(--muted); }

/* BAR CHART */
.bar-chart { margin-bottom:18px; }
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.bar-year { width:40px; font-size:13px; font-weight:700; color:var(--orange); text-align:right; flex-shrink:0; }
.bar-wrap { flex:1; display:flex; flex-direction:column; gap:4px; }
.bar-item { display:flex; align-items:center; gap:7px; }
.bar-label { width:60px; font-size:11px; color:var(--muted); text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:18px; background:var(--card2); border-radius:4px; overflow:hidden; position:relative; }
.bar-fill { height:100%; border-radius:4px; transition:width 0.8s ease; position:relative; }
.bar-fill.demand { background:rgba(59,130,246,0.7); }
.bar-fill.actual { background:rgba(16,185,129,0.7); }
.bar-val { font-size:12px; font-weight:700; width:50px; flex-shrink:0; }

/* PRICE TABLE */
.price-history { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:18px; }
.price-history table { width:100%; border-collapse:collapse; }
.price-history th { background:var(--card2); padding:10px 14px; font-size:12px; color:var(--muted); font-weight:700; text-align:center; border-bottom:1px solid var(--border); }
.price-history td { padding:10px 14px; font-size:14px; text-align:center; border-bottom:1px solid var(--border); }
.price-history tr:last-child td { border-bottom:none; }

.source-note { text-align:center; font-size:12px; color:var(--muted); margin-top:24px; padding-top:16px; border-top:1px solid var(--border); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">MY <span>SIDE</span> Investments</div>
  <div class="badge">🔴 נתונים חיים · data.gov.il</div>
</div>

<div class="main">
  <div class="hero">
    <h1>ניתוח <span>שוק</span> לפי עיר</h1>
    <p>נתוני ממשלה אמיתיים + ניתוח AI מלא — מחירים, אוכלוסייה, בנייה vs ביקוש</p>
  </div>

  <!-- API key embedded in code -->

  <div class="search-wrap">
    <span class="search-label">בחר עיר לניתוח</span>

      <input type="text" class="search-input" id="cityInput" placeholder="חיפה, נתניה, באר שבע..." />

      <button class="city-chip" onclick="quickCity('אשדוד')">אשדוד</button>
      <button class="city-chip" onclick="quickCity('פתח תקווה')">פתח תקווה</button>

</div>

<script>
function quickCity(n) { document.getElementById('cityInput').value = n; }
function setStatus(step, msg) {
  document.getElementById('statusStep').textContent = step;
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('statusBar').classList.add('active');
}
function hideStatus() { document.getElementById('statusBar').classList.remove('active'); }
function showError(msg) { const e = document.getElementById('errorBox'); e.textContent = msg; e.classList.add('active'); }
function hideError() { document.getElementById('errorBox').classList.remove('active'); }

async function fetchGovData(city) {
  const base = 'https://data.gov.il/api/3/action/datastore_search';
  // Fetch real estate transactions
  const nadlanUrl = `${base}?resource_id=b8ef79f4-b746-4428-9b62-c4b0e1dbd571&q=${encodeURIComponent(city)}&limit=200`;
  // Fetch building permits
  const permitsUrl = `${base}?resource_id=bb68225f-f246-40a6-8bf8-1e6b40f14e77&q=${encodeURIComponent(city)}&limit=200`;

  const results = { nadlan: [], permits: [], nadlanTotal: 0, permitsTotal: 0 };

  try {
    const r1 = await fetch(nadlanUrl);
    if (r1.ok) {
      const d1 = await r1.json();
      if (d1.success) { results.nadlan = d1.result.records || []; results.nadlanTotal = d1.result.total || 0; }
    }
  } catch(e) { console.warn('nadlan fetch failed', e); }

  try {
    const r2 = await fetch(permitsUrl);
    if (r2.ok) {
      const d2 = await r2.json();
      if (d2.success) { results.permits = d2.result.records || []; results.permitsTotal = d2.result.total || 0; }
    }
  } catch(e) { console.warn('permits fetch failed', e); }

  return results;
}

function summarizeGovData(city, data) {
  const { nadlan, nadlanTotal, permits, permitsTotal } = data;

  // Price extraction
  const priceFields = ['DEAL_SUM','deal_sum','PRICE','price','SUM','sum'];
  const prices = [];
  nadlan.forEach(r => {
    priceFields.forEach(f => {
      if (r[f]) { const n = Number(String(r[f]).replace(/,/g,'')); if (n > 100000 && n < 50000000) prices.push(n); }
    });
  });

  // Date extraction for year grouping
  const dateFields = ['DEAL_DATE','deal_date','DATE','date','YEARMONTH'];
  const byYear = {};
  nadlan.forEach(r => {
    dateFields.forEach(f => {
      if (r[f]) {
        const match = String(r[f]).match(/\d{4}/);
        if (match) { const yr = match[0]; byYear[yr] = (byYear[yr]||0) + 1; }
      }
    });
  });

  // Permit year grouping
  const permitsByYear = {};
  const permitDateFields = ['DATE','date','YEAR','year','ISSUE_DATE'];
  permits.forEach(r => {
    permitDateFields.forEach(f => {
      if (r[f]) {
        const match = String(r[f]).match(/\d{4}/);
        if (match) { const yr = match[0]; if (yr >= '2019' && yr <= '2025') permitsByYear[yr] = (permitsByYear[yr]||0) + 1; }
      }
    });
  });

  const avg = prices.length ? Math.round(prices.reduce((a,b)=>a+b,0)/prices.length) : 0;
  const sorted = [...prices].sort((a,b)=>a-b);
  const median = sorted.length ? sorted[Math.floor(sorted.length/2)] : 0;

  return `
City: ${city}
Real estate transactions found: ${nadlanTotal} (loaded: ${nadlan.length})
Average price extracted: ${avg.toLocaleString()} NIS
Median price extracted: ${median.toLocaleString()} NIS
Prices count: ${prices.length}
Transactions by year: ${JSON.stringify(byYear)}
Building permits found: ${permitsTotal} (loaded: ${permits.length})
Permits by year: ${JSON.stringify(permitsByYear)}
Sample nadlan record (first): ${JSON.stringify(nadlan[0] || {})}
Sample permit record (first): ${JSON.stringify(permits[0] || {})}
  `.trim();
}

async function analyzeWithClaude(city, govSummary, apiKey, hasData) {
  const system = `You are a senior real estate investment analyst for MY SIDE Investments in Israel.
Respond ONLY with a valid JSON object. No markdown fences, no text before or after the JSON.
All string values must be in Hebrew. Keep string values simple — no slashes inside strings, no special JSON-breaking characters.`;

  const user = `Analyze the Israeli city "${city}" for real estate investment.
${hasData ? `Government data from data.gov.il:\n${govSummary}\n\n` : ''}
Use your deep knowledge of the Israeli real estate market.
Return this exact JSON structure — fill all fields with real Hebrew data for ${city}:

{
  "score": "A",
  "score_reason": "short reason",
  "population": 200000,
  "population_growth_pct": 2.1,
  "population_prev_year": 196000,
  "median_price_3br": 1200000,
  "price_change_1yr_pct": 8.5,
  "price_change_5yr_pct": 31.4,
  "avg_price_per_sqm": 15000,
  "yield_estimate_pct": 4.5,
  "demand_level": "גבוה",
  "supply_level": "נמוך",
  "analysis": "market analysis 3-4 sentences",
  "pros": ["pro1", "pro2", "pro3"],
  "cons": ["con1", "con2"],
  "opportunities": ["opp1", "opp2"],
  "risks": ["risk1", "risk2"],
  "verdict": "investment recommendation 2-3 sentences",
  "best_neighborhoods": ["n1", "n2", "n3"],
  "property_type_rec": "recommended property type",
  "price_history": [
    {"year": "2020", "median_price": 900000, "change_pct": 0},
    {"year": "2021", "median_price": 980000, "change_pct": 8.9},
    {"year": "2022", "median_price": 1100000, "change_pct": 12.2},
    {"year": "2023", "median_price": 1130000, "change_pct": 2.7},
    {"year": "2024", "median_price": 1200000, "change_pct": 6.2}
  ],
  "supply_demand": [
    {"year": "2020", "required": 800, "built": 273, "deficit": -527},
    {"year": "2021", "required": 850, "built": 194, "deficit": -656},
    {"year": "2022", "required": 900, "built": 514, "deficit": -386},
    {"year": "2023", "required": 950, "built": 161, "deficit": -789},
    {"year": "2024", "required": 1000, "built": 18, "deficit": -982}
  ],
  "total_required_5yr": 4500,
  "total_built_5yr": 1160,
  "cumulative_deficit": 3340
}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 2000,
      system: system,
      messages: [{ role: 'user', content: user }]
    })
  });

  if (!resp.ok) {
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.error?.message || `API error ${resp.status}`);
  }

  const data = await resp.json();
  const text = (data.content?.[0]?.text || '').trim();
  const clean = text.replace(/^```[a-z]*\n?/i,'').replace(/\n?```$/i,'').trim();
  const start = clean.indexOf('{');
  const end = clean.lastIndexOf('}');
  if (start === -1 || end === -1) throw new Error('Claude did not return valid JSON');
  const jsonStr = clean.slice(start, end+1);
  try { return JSON.parse(jsonStr); }
  catch(e) {
    const fixed = jsonStr.replace(/,(\s*[}\]])/g,'$1');
    return JSON.parse(fixed);
  }
}

function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function renderResults(city, a, hasData) {
  const scoreClass = a.score?.startsWith('A') ? 'score-a' : a.score?.startsWith('B') ? 'score-b' : 'score-c';
  const pop = Number(a.population || 0);
  const popPrev = Number(a.population_prev_year || 0);
  const popGrowth = Number(a.population_growth_pct || 0);
  const price1yr = Number(a.price_change_1yr_pct || 0);
  const price5yr = Number(a.price_change_5yr_pct || 0);
  const medianPrice = Number(a.median_price_3br || 0);
  const sqmPrice = Number(a.avg_price_per_sqm || 0);

  // Supply-demand table
  const sd = a.supply_demand || [];
  const maxRequired = Math.max(...sd.map(r => Number(r.required||0)), 1);

  const sdRows = sd.map(r => {
    const req = Number(r.required || 0);
    const built = Number(r.built || 0);
    const deficit = Number(r.deficit || 0);
    const reqPct = Math.round((req / maxRequired) * 100);
    const builtPct = Math.round((built / maxRequired) * 100);
    return `<tr>
      <td class="year-col">${r.year}</td>
      <td>${req.toLocaleString()}</td>
      <td>${built.toLocaleString()}</td>
      <td class="${deficit < 0 ? 'deficit' : 'surplus'}">${deficit > 0 ? '+' : ''}${deficit.toLocaleString()}</td>
    </tr>`;
  }).join('');

  const sdTotal = `<tr style="font-weight:700;background:var(--card2)">
    <td class="year-col">סה"כ</td>
    <td>${Number(a.total_required_5yr||0).toLocaleString()}</td>
    <td>${Number(a.total_built_5yr||0).toLocaleString()}</td>
    <td class="deficit">${Number(a.cumulative_deficit||0).toLocaleString()}</td>
  </tr>`;

  // Bar chart
  const barRows = sd.map(r => {
    const req = Number(r.required || 0);
    const built = Number(r.built || 0);
    const reqPct = Math.round((req / maxRequired) * 100);
    const builtPct = Math.round((built / maxRequired) * 100);
    return `<div class="bar-row">
      <div class="bar-year">${r.year}</div>
      <div class="bar-wrap">
        <div class="bar-item">
          <div class="bar-label">נדרשות</div>
          <div class="bar-track"><div class="bar-fill demand" style="width:${reqPct}%"></div></div>
          <div class="bar-val" style="color:var(--blue)">${req.toLocaleString()}</div>
        </div>
        <div class="bar-item">
          <div class="bar-label">נבנו</div>
          <div class="bar-track"><div class="bar-fill actual" style="width:${builtPct}%"></div></div>
          <div class="bar-val" style="color:var(--green)">${built.toLocaleString()}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Price history table
  const ph = a.price_history || [];
  const phRows = ph.map(p => {
    const chg = Number(p.change_pct || 0);
    return `<tr>
      <td>${p.year}</td>
      <td>₪${Number(p.median_price||0).toLocaleString()}</td>
      <td class="${chg > 0 ? 'up' : chg < 0 ? 'down' : 'neutral-val'}">${chg > 0 ? '+' : ''}${chg}%</td>
    </tr>`;
  }).join('');

  return `
    ${!hasData ? '<div class="warn-box">⚠️ data.gov.il לא החזיר עסקאות ספציפיות — הניתוח מבוסס על ידע Claude</div>' : ''}

    <div class="city-header">
      <div>
        <div class="city-name">${city}</div>
        <div class="city-subtitle">${a.property_type_rec || ''} · אוכלוסייה: ${pop.toLocaleString()} · גידול: +${popGrowth}% לשנה</div>
      </div>
      <div class="score-box">
        <div class="score-label">ציון השקעה</div>
        <div class="score-value ${scoreClass}">${a.score || 'N/A'}</div>
        <div class="score-sub">${a.score_reason || ''}</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="tab-overview" onclick="switchTab('tab-overview')">📊 סקירה כללית</div>
      <div class="tab" data-tab="tab-population" onclick="switchTab('tab-population')">👥 אוכלוסייה ומחירים</div>
      <div class="tab" data-tab="tab-supply" onclick="switchTab('tab-supply')">🏗️ בנייה vs ביקוש</div>
    </div>

    <!-- TAB 1: OVERVIEW -->
    <div class="tab-panel active" id="tab-overview">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">מחיר חציוני 3 חד'</div>
          <div class="stat-value" style="font-size:17px">₪${medianPrice.toLocaleString()}</div>
          <div class="stat-change ${price1yr > 0 ? 'up' : 'down'}">${price1yr > 0 ? '+' : ''}${price1yr}% בשנה האחרונה</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">מחיר למ"ר</div>
          <div class="stat-value" style="font-size:17px">₪${sqmPrice.toLocaleString()}</div>
          <div class="stat-change neutral">ממוצע שוק</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">תשואת שכירות</div>
          <div class="stat-value">${a.yield_estimate_pct || 'N/A'}%</div>
          <div class="stat-change neutral">שנתי ברוטו</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">ביקוש / היצע</div>
          <div class="stat-value" style="font-size:15px">${a.demand_level || 'N/A'}</div>
          <div class="stat-change neutral">היצע: ${a.supply_level || 'N/A'}</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">ניתוח שוק</div>
        <div class="analysis-card">
          <div class="analysis-text">${(a.analysis||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>
        </div>
      </div>

      ${(a.best_neighborhoods||[]).length ? `
      <div class="section">
        <div class="section-title">שכונות מומלצות</div>
        <div class="neighborhoods">${(a.best_neighborhoods||[]).map(n=>`<span class="neighborhood-tag">${n}</span>`).join('')}</div>
      </div>` : ''}

      <div class="highlights">
        <div class="highlight green"><div class="highlight-title">✅ יתרונות</div><ul>${(a.pros||[]).map(p=>`<li>${p}</li>`).join('')}</ul></div>
        <div class="highlight red"><div class="highlight-title">⚠️ חסרונות</div><ul>${(a.cons||[]).map(c=>`<li>${c}</li>`).join('')}</ul></div>
        <div class="highlight orange"><div class="highlight-title">🎯 הזדמנויות</div><ul>${(a.opportunities||[]).map(o=>`<li>${o}</li>`).join('')}</ul></div>
        <div class="highlight blue"><div class="highlight-title">⚡ סיכונים</div><ul>${(a.risks||[]).map(r=>`<li>${r}</li>`).join('')}</ul></div>
      </div>

      <div class="verdict">
        <div class="verdict-label">🏆 המלצת MY SIDE</div>
        <div class="verdict-text">${a.verdict||''}</div>
      </div>
    </div>

    <!-- TAB 2: POPULATION & PRICES -->
    <div class="tab-panel" id="tab-population">
      <div class="stats-grid-3">
        <div class="stat-card">
          <div class="stat-label">תושבים היום</div>
          <div class="stat-value">${pop.toLocaleString()}</div>
          <div class="stat-change up">+${popGrowth}% לשנה</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">תושבים שנה שעברה</div>
          <div class="stat-value">${popPrev ? popPrev.toLocaleString() : 'N/A'}</div>
          <div class="stat-change up">+${pop && popPrev ? (pop-popPrev).toLocaleString() : 'N/A'} תושבים</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">גידול שנתי ממוצע</div>
          <div class="stat-value">${popGrowth}%</div>
          <div class="stat-change neutral">5 שנים אחרונות</div>
        </div>
      </div>

      <div class="stats-grid-2">
        <div class="stat-card">
          <div class="stat-label">שינוי מחיר — שנה אחרונה</div>
          <div class="stat-value ${price1yr > 0 ? 'up' : 'down'}">${price1yr > 0 ? '+' : ''}${price1yr}%</div>
          <div class="stat-change neutral">2023 → 2024</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">שינוי מחיר — 5 שנים</div>
          <div class="stat-value ${price5yr > 0 ? 'up' : 'down'}">${price5yr > 0 ? '+' : ''}${price5yr}%</div>
          <div class="stat-change neutral">2020 → 2024</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">היסטוריית מחירים שנתית — דירת 3 חדרים</div>
        <div class="price-history">
          <table>
            <thead><tr><th>שנה</th><th>מחיר חציוני</th><th>שינוי</th></tr></thead>
            <tbody>${phRows}</tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- TAB 3: SUPPLY VS DEMAND -->
    <div class="tab-panel" id="tab-supply">
      <div class="stats-grid-3">
        <div class="stat-card">
          <div class="stat-label">דירות נדרשות — 5 שנים</div>
          <div class="stat-value">${Number(a.total_required_5yr||0).toLocaleString()}</div>
          <div class="stat-change neutral">לפי גידול אוכלוסייה</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">דירות שנבנו בפועל</div>
          <div class="stat-value">${Number(a.total_built_5yr||0).toLocaleString()}</div>
          <div class="stat-change neutral">היתרי בנייה מומשו</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">גירעון מצטבר</div>
          <div class="stat-value down">${Number(a.cumulative_deficit||0).toLocaleString()}</div>
          <div class="stat-change down">לחץ על המחירים</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">פירוט שנתי — דירות נדרשות מול בנייה בפועל</div>
        <table class="supply-table">
          <thead>
            <tr>
              <th>שנה</th>
              <th>דירות נדרשות</th>
              <th>היתרי בנייה</th>
              <th>גירעון / עודף</th>
            </tr>
          </thead>
          <tbody>${sdRows}${sdTotal}</tbody>
        </table>
      </div>

      <div class="section">
        <div class="section-title">ויזואליזציה — ביקוש מול היצע</div>
        <div class="analysis-card">
          <div class="bar-chart">${barRows}</div>
          <div style="display:flex;gap:20px;margin-top:8px;justify-content:center;">
            <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)"><div style="width:14px;height:14px;background:rgba(59,130,246,0.7);border-radius:3px"></div>דירות נדרשות</div>
            <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)"><div style="width:14px;height:14px;background:rgba(16,185,129,0.7);border-radius:3px"></div>בנייה בפועל</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

async function analyzeCity() {
  const city = document.getElementById('cityInput').value.trim();
  const apiKey = 'YOUR_API_KEY_HERE';
  if (!city) { showError('יש להזין שם עיר'); return; }

  hideError();
  document.getElementById('results').classList.remove('active');
  document.getElementById('analyzeBtn').disabled = true;

  let govSummary = '';
  let hasData = false;

  try {
    setStatus('שלב 1/3', `מושך נתוני עסקאות ובנייה עבור "${city}"...`);
    try {
      const govData = await fetchGovData(city);
      if (govData.nadlan.length > 0 || govData.permits.length > 0) {
        hasData = true;
        govSummary = summarizeGovData(city, govData);
      }
    } catch(e) { console.warn('gov data error:', e); }

    setStatus('שלב 2/3', 'מנתח אוכלוסייה, מחירים ובנייה עם Claude...');
    const analysis = await analyzeWithClaude(city, govSummary, apiKey, hasData);

    setStatus('שלב 3/3', 'בונה דוח...');
    await new Promise(r => setTimeout(r, 300));

    hideStatus();
    const el = document.getElementById('results');
    el.innerHTML = renderResults(city, analysis, hasData);
    el.classList.add('active');

  } catch(err) {
    hideStatus();
    showError('שגיאה: ' + err.message);
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('cityInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') analyzeCity();
  });
});
</script>
</body>
</html>
